MEMORY {
    ZP:         start = $0000, size = $00E7, file = "";
    CHRGETZP:   start = $00E8, size = $0018, file = "%O.0";
    INITROM:    start = $1000, size = $8000, file = "%O";
    TXTTAB:     start = $0200, size = $BE00, file = "", define = yes;
    BASROM:     start = $C000, size = $3DDE, file = "%O.1";
    LFTAB:      start = $FDDE, size = $0010, file = "", define = yes;
    FOUTBUF:    start = $FDEE, size = $0011, file = "", define = yes;
    INBUF1:     start = $FDFF, size = $0001, file = "", define = yes;
    INBUF:      start = $FE00, size = $0100, file = "", define = yes;
    DUMMY:      start = $0000, size = $0100, file = "";
}

SEGMENTS {
    ZEROPAGE:   load = ZP, type = zp;
    CHRGET:     load = CHRGETZP, type = ro, define = yes;
    INIT:       load = INITROM, type = ro;
    HEADER:     load = BASROM, type = ro;
    VECTORS:    load = BASROM, type = ro;
    ERROR:      load = BASROM, type = ro;
    CODE:       load = BASROM, type = ro;
    EXTRA:      load = BASROM, type = ro;
    KEYWORDS_A: load = BASROM, type = ro, define = yes;
    KEYWORDS_B: load = BASROM, type = ro, define = yes;
    DUMMY_A:    load = DUMMY; # bin A token counter; not in binary
    DUMMY_B:    load = DUMMY; # bin B token counter; not in binary
}
